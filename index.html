<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShareDrop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── AUTH SCREEN ─── -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg">
      <div class="auth-card">
        <div class="logo-ring">
          <svg class="logo-cloud" viewBox="0 0 64 64" fill="none">
            <path class="cloud-body" d="M48 28C48 19.16 40.84 12 32 12C26.58 12 21.76 14.82 19.04 19.12C12.34 19.38 7 24.83 7 31.5C7 38.4 12.6 44 19.5 44H48C53.52 44 58 39.52 58 34C58 28.64 53.73 24.33 48.43 24.08C48.16 25.38 48 26.68 48 28Z"/>
            <path class="cloud-arrow" d="M40 36L32 28L24 36"/>
            <line class="cloud-line" x1="32" y1="28" x2="32" y2="48"/>
          </svg>
        </div>
        <h1 class="auth-title">ShareDrop</h1>
        <p class="auth-sub">Share files with anyone. No size limits.</p>
        <button id="google-btn" class="google-btn">
          <svg class="g-logo" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <p class="auth-hint">Sign in to create and share projects</p>
      </div>
    </div>
  </div>

  <!-- ─── APP SCREEN ─── -->
  <div id="app-screen" class="screen">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="h-icon" viewBox="0 0 28 28" fill="none">
          <path d="M21 12C21 7.58 17.42 4 13 4C10.17 4 7.69 5.49 6.26 7.75C2.66 7.92 0 10.67 0 14C0 17.31 2.69 20 6 20H21C23.76 20 26 17.76 26 15C26 12.33 23.84 10.17 21.14 10.06C21.05 10.37 21 10.68 21 12Z" fill="url(#hg)" />
          <path d="M17 16L13 12L9 16" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 12V22" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <defs>
            <linearGradient id="hg" x1="0" y1="4" x2="26" y2="20">
              <stop stop-color="#60a5fa"/><stop offset="1" stop-color="#3b82f6"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="brand">ShareDrop</span>
      </div>
      <div class="header-right">
        <img id="user-photo" class="user-photo" alt="avatar" />
        <span id="user-name" class="user-name"></span>
        <button id="signout-btn" class="ghost-btn">Sign out</button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tab-nav" id="tab-nav">
      <button class="tab-item active" data-tab="mine">
        <svg class="tab-ico" viewBox="0 0 18 18" fill="none">
          <path d="M2 5a2 2 0 012-2h3l2 2h7a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2V5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        My Projects
      </button>
      <button class="tab-item" data-tab="shared">
        <svg class="tab-ico" viewBox="0 0 18 18" fill="none">
          <circle cx="7" cy="6" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1 16c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="14" cy="6" r="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M17 14c0-2.21-1.34-4.1-3.25-4.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Shared with Me
      </button>
      <span class="tab-bar" id="tab-bar"></span>
    </nav>

    <!-- Content -->
    <main class="main">
      <section class="pane active" id="pane-mine">
        <div class="pane-header">
          <h2 class="pane-title">My Projects</h2>
          <button id="new-project-btn" class="cta-btn pulse-once">
            <svg viewBox="0 0 14 14" fill="none" class="btn-ico"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            New Project
          </button>
        </div>
        <div id="grid-mine" class="proj-grid"></div>
      </section>

      <section class="pane" id="pane-shared">
        <div class="pane-header">
          <h2 class="pane-title">Shared with Me</h2>
        </div>
        <div id="grid-shared" class="proj-grid"></div>
      </section>
    </main>
  </div>

  <!-- ─── NEW PROJECT MODAL ─── -->
  <div class="overlay" id="ov-new">
    <div class="modal modal-sm" role="dialog">
      <div class="modal-head">
        <h3>New Project</h3>
        <button class="x-btn" data-close="ov-new">
          <svg viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <label class="lbl">Project name <span class="req">*</span></label>
        <input id="inp-name" class="inp" type="text" placeholder="Untitled project…" autocomplete="off"/>
        <label class="lbl">Description <span class="opt">(optional)</span></label>
        <input id="inp-desc" class="inp" type="text" placeholder="What are you sharing?" autocomplete="off"/>
      </div>
      <div class="modal-foot">
        <button class="ghost-btn" data-close="ov-new">Cancel</button>
        <button id="btn-create" class="cta-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- ─── PROJECT VIEW MODAL ─── -->
  <div class="overlay" id="ov-proj">
    <div class="modal modal-lg" role="dialog">
      <div class="modal-head">
        <div>
          <h3 id="proj-name">Project</h3>
          <p id="proj-desc-label" class="modal-sub"></p>
        </div>
        <button class="x-btn" data-close="ov-proj">
          <svg viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body proj-layout">

        <!-- FILES COLUMN -->
        <div class="col-files">
          <div id="drop-zone" class="drop-zone">
            <input type="file" id="file-inp" multiple hidden />
            <div class="drop-content">
              <div class="drop-cloud" id="drop-cloud">
                <svg viewBox="0 0 56 56" fill="none">
                  <path class="dc-body" d="M42 24C42 17.37 36.63 12 30 12C25.56 12 21.7 14.38 19.56 18C14.24 18.17 10 22.5 10 28C10 33.52 14.48 38 20 38H42C46.42 38 50 34.42 50 30C50 25.75 46.71 22.27 42.46 22.06C42.16 22.69 42 23.33 42 24Z"/>
                  <path class="dc-arrow" d="M36 32L30 26L24 32"/>
                  <line class="dc-line" x1="30" y1="26" x2="30" y2="44"/>
                </svg>
              </div>
              <p class="drop-label">Drop files here</p>
              <p class="drop-hint">or <span class="link-text" id="browse-files">browse</span></p>
            </div>
          </div>
          <div id="file-list" class="file-list">
            <p class="empty-files" id="files-empty">No files yet — upload something!</p>
          </div>
        </div>

        <!-- MEMBERS COLUMN -->
        <div class="col-members">
          <p class="col-title">Members</p>
          <div id="member-list" class="member-list"></div>
          <div id="invite-block" class="invite-block">
            <div class="invite-row">
              <input id="inp-email" class="inp sm-inp" type="email" placeholder="friend@email.com" />
              <button id="btn-add" class="cta-btn sm-btn">Add</button>
            </div>
            <p id="invite-msg" class="invite-msg"></p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
